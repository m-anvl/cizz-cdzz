name: Project clang-format check

on:
  workflow_call:
    inputs:
      base_branch:
        required: true
        type: string
      pull_request_number:
        required: false
        type: string
      event_name:
        required: true
        type: string
      event_before:
        required: false
        type: string
      head_sha:
        required: false
        type: string

jobs:
  build:
    name: run on linux
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
    - name: update-workspace
      run: |
        sudo apt -qq update
        sudo apt install -y clang-format-20 wget
        sudo cp .github/scripts/git-clang-format /usr/local/bin/
        sudo chmod +x /usr/local/bin/git-clang-format
        sudo ln -sf /usr/bin/clang-format-20 /usr/bin/clang-format
    - name: check-format
      id: check-formatting
      run: |
          if [[ "${{ inputs.event_name }}" == pull_request* ]]; then
            git fetch origin ${{ inputs.base_branch }}
            base_ref="origin/${{ inputs.base_branch }}"
            head_ref="${{ inputs.head_sha }}"
            if [ -z "$head_ref" ]; then
              echo "Error: head_sha is empty for PR event"
              exit 1
            fi
          else
            if [ -n "${{ inputs.event_before }}" ] && git rev-parse --verify --quiet "${{ inputs.event_before }}" >/dev/null; then
              base_ref="${{ inputs.event_before }}"
              head_ref="HEAD"
            else
              base_ref="HEAD^1"
              head_ref="HEAD"
            fi
          fi
          set +e
          output=$(git clang-format --diff "$base_ref" "$head_ref" --extensions cpp,cc,cxx,h,hpp 2>&1)
          exit_code=$?
          set -e
          echo "clang-format output:"
          echo "$output"
          if [ $exit_code -eq 0 ]; then
              echo "clang-format passed."
          else
              echo "diff<<EOF" >> $GITHUB_OUTPUT
              echo "$output" >> $GITHUB_OUTPUT
              echo "EOF" >> $GITHUB_OUTPUT
              echo "clang-format failed."
              exit 1
          fi
    - name: post-comment-on-pull-request
      if: failure() && inputs.pull_request_number != ''
      uses: actions/github-script@v8
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        script: |
          const fs = require('fs');
          const templatePath = '.github/COMMENT_TEMPLATE/code_format_failure.md';
          let template;
          try {
            template = fs.readFileSync(templatePath, 'utf8');
          } catch (err) {
            console.error('Failed to read template:', err);
            template = '## Code formatting issues found\n\nPlease format the code locally to fix these issues.\n\n```diff\n{{DIFF}}\n```';
          }
          const contributingUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/blob/master/CONTRIBUTING.md`;
          const diff = `${{ steps.check-formatting.outputs.diff }}`;
          const body = template
            .replace(/{{CONTRIBUTING_URL}}/g, contributingUrl)
            .replace(/{{DIFF}}/g, diff);
          const prNumber = ${{ inputs.pull_request_number }};
          await github.rest.issues.createComment({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: prNumber,
            body: body
          });