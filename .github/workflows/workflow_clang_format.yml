name: Project clang-format check

on:
  workflow_call:
    inputs:
      base_branch:
        required: true
        type: string
      pull_request_number:
        required: false
        type: string
      event_name:
        required: true
        type: string
      event_before:
        required: false
        type: string
    secrets:
      COMMENT_TOKEN:
        required: false

jobs:
  build:
    name: run on linux
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
    - name: update-workspace
      run: |
        sudo apt -qq update
        sudo apt install -y clang-format-20 wget
        sudo wget -O /usr/local/bin/git-clang-format https://raw.githubusercontent.com/llvm/llvm-project/release/20.x/clang/tools/clang-format/git-clang-format
        sudo chmod +x /usr/local/bin/git-clang-format
        sudo ln -sf /usr/bin/clang-format-20 /usr/bin/clang-format
    - name: check-format
      id: check-formatting
      run: |
          if [ "${{ inputs.event_name }}" = "pull_request" ]; then
            git fetch origin ${{ inputs.base_branch }}
            compare_with="origin/${{ inputs.base_branch }}"
          else
            if [ -n "${{ inputs.event_before }}" ] && git rev-parse --verify --quiet "${{ inputs.event_before }}" >/dev/null; then
              compare_with="${{ inputs.event_before }}"
            else            
              compare_with="HEAD^1"
            fi
          fi
          output=$(git clang-format --diff "$compare_with" --extensions cpp,cc,cxx,h,hpp 2>&1) || exit_code=$?
          echo "clang-format output:"
          echo "$output"
          if [ $exit_code -eq 0 ]; then
              echo "clang-format passed."
          else
              echo "diff<<EOF" >> $GITHUB_OUTPUT
              echo "$output" >> $GITHUB_OUTPUT
              echo "EOF" >> $GITHUB_OUTPUT
              echo "clang-format failed."
              exit 1
          fi
    - name: post-comment-on-pull-request
      if: failure() && inputs.pull_request_number != ''
      uses: actions/github-script@v8
      with:
        github-token: ${{ secrets.COMMENT_TOKEN || secrets.GITHUB_TOKEN }}
        script: |
          const fs = require('fs');
          const templatePath = '.github/COMMENT_TEMPLATE/code_format_failure.md';
          let template;
          try {
            template = fs.readFileSync(templatePath, 'utf8');
          } catch (err) {
            console.error('Failed to read template:', err);
            template = '## Code formatting issues found\n\nPlease format the code locally to fix these issues.\n\n```diff\n{{DIFF}}\n```';
          }
          const contributingUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/blob/master/CONTRIBUTING.md`;
          const diff = `${{ steps.check-formatting.outputs.diff }}`;
          const body = template
            .replace(/{{CONTRIBUTING_URL}}/g, contributingUrl)
            .replace(/{{DIFF}}/g, diff);
          const prNumber = ${{ inputs.pull_request_number }};
          await github.rest.issues.createComment({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: prNumber,
            body: body
          });